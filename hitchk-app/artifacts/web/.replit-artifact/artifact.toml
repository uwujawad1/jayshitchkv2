kind = "web"
previewPath = "/"
title = "HIT Checker"
version = "1.0.0"
id = "artifacts/web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 5000
name = "web"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace/hitchk-app && npm run dev"

[services.env]
PORT = "5000"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/web", "run", "build"]
publicDir = "artifacts/web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
